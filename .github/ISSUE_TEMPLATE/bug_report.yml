name: Bug report
description: Report a problem so we can fix it
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include
        passwords, private keys, tokens, or other secrets in this report.
        For security vulnerabilities, follow SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - API Debugger
        - SSH Terminal
        - Database
        - Workspace / shell
        - MCP server
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Unfour version
      description: Release version or commit SHA.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs. Make sure secrets are redacted.
    validations:
      required: false
